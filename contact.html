<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — Best Betting Tips</title>
<link rel="icon" type="image/png" href="/assets/images/favicon.png">
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/fixes.css">
</head>
<body>
<div class="section"><div class="container">
  <div class="post-breadcrumb" style="display:flex;margin-bottom:32px"><a href="/">Home</a><span class="breadcrumb-sep">›</span><span>Contact</span></div>
  <div class="contact-inner" style="max-width:900px">
    <div class="contact-text">
      <h1 style="font-size:2rem;margin-bottom:12px;">Contact Us</h1>
      <p class="contact-sub">Have a question, feedback, or want to work with us? Drop us a message and we'll get back to you as soon as possible.</p>
      <p class="contact-email">📧 <a href="mailto:admin@bestbettingtips.com.au" style="color:var(--teal)">admin@bestbettingtips.com.au</a></p>
    </div>
    <form class="contact-form" name="contact" method="POST" data-netlify="true">
      <input type="hidden" name="form-name" value="contact">
      <div class="contact-row">
        <input type="text" name="name" placeholder="Your Name" required class="contact-input">
        <input type="email" name="email" placeholder="Your Email" required class="contact-input">
      </div>
      <input type="text" name="subject" placeholder="Subject" class="contact-input" style="width:100%">
      <textarea name="message" placeholder="Your message..." required class="contact-input contact-textarea"></textarea>
      <button type="submit" class="btn-primary contact-submit">Send Message</button>
    </form>
  </div>
</div></div>
<script src="/assets/logo.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/footer.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
